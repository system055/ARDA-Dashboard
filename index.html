<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scavenger Hunt</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Center container perfectly */
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
}

/* Button styling */
.start-btn {
  cursor: pointer;
  background-color: black;
  border: 2px solid white;
  color: white;
  padding: 14px 28px;
  font-size: 18px;
  transition: all 0.3s ease;
  margin-top: 20px;
}

.start-btn:hover {
  box-shadow: 0 0 25px white;
}
</style>
</head>

<body>

<!-- Particle background -->
<div id="particles" style="position: fixed; top:0; left:0; width:100%; height:100%; z-index:1;"></div>

<!-- Main container -->
<div class="container">

<h1 class="title">ADVANCED RESEARCH PROTOCOL</h1>
<p class="subtitle">Classified Access Terminal</p>

<p style="font-size:20px; letter-spacing:2px; margin-top:20px;">
Please authenticate to begin the scavenger mission.
</p>

<button class="start-btn" onclick="window.location.href='puzzle1.html'">
INITIALIZE PROTOCOL
</button>

</div>

<!-- Global scripts -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.0/tsparticles.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
