<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARDA Access</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
height:100%;
background:black;
font-family:'JetBrains Mono',monospace;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

#particles{
position:fixed;
width:100%;
height:100%;
z-index:1;
}

.container{
z-index:10;
width:380px;
}

.auth-box{
border:2px solid white;
padding:35px;
background:black;
text-align:center;
}

.title{
font-size:26px;
letter-spacing:2px;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
background:black;
border:2px solid white;
color:white;
font-family:'JetBrains Mono',monospace;
font-size:15px;
}

.password-row{
display:flex;
margin-top:12px;
}

.password-row input{
flex:1;
margin-top:0;
}

.toggle{
width:70px;
border:2px solid white;
background:black;
color:white;
cursor:pointer;
}

.toggle:hover{
box-shadow:0 0 12px white;
}

.start-btn{
margin-top:18px;
width:100%;
padding:14px;
border:2px solid white;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.start-btn:hover{
box-shadow:0 0 25px white;
}

.switch{
margin-top:18px;
font-size:14px;
}

.switch button{
background:none;
border:none;
color:white;
cursor:pointer;
text-decoration:underline;
}

.status{
margin-top:14px;
font-size:14px;
min-height:18px;
}

</style>

</head>

<body>

<div id="particles"></div>

<div class="container">

<div class="auth-box">

<div class="title" id="title">CREATE ACCOUNT</div>

<input id="username" placeholder="Username">

<div class="password-row">

<input id="password" type="password" placeholder="Password">

<button class="toggle" onclick="togglePassword()">SHOW</button>

</div>

<button class="start-btn" id="submitBtn">CREATE ACCOUNT</button>

<div class="switch">

<span id="switchText">Already have an account?</span>

<button onclick="toggleMode()">Login</button>

</div>

<div class="status" id="status"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://psiqmduohdryllkkqucb.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzaXFtZHVvaGRyeWxsa2txdWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzgzOTEsImV4cCI6MjA5MDE1NDM5MX0.CpPpFPwnAlFnzk43dCzRoJWWRWMQpQPpPkQ7giTyIfg"
)

let loginMode = false

function togglePassword(){

const pass=document.getElementById("password")

pass.type=pass.type==="password"?"text":"password"

}

function toggleMode(){

loginMode=!loginMode

if(loginMode){

title.innerText="LOGIN"
submitBtn.innerText="LOGIN"
switchText.innerText="Need an account?"

}else{

title.innerText="CREATE ACCOUNT"
submitBtn.innerText="CREATE ACCOUNT"
switchText.innerText="Already have an account?"

}

}

submitBtn.onclick = async () => {

const username=document.getElementById("username").value.trim().toLowerCase()
const password=document.getElementById("password").value
const status=document.getElementById("status")

if(!username || !password){
status.innerText="Enter username and password"
return
}

const email=username+"@arda-user.com"

status.innerText="Processing..."

try{

if(loginMode){

const {error}=await supabase.auth.signInWithPassword({
email,
password
})

if(error){
status.innerText=error.message
return
}

}else{

const {data,error}=await supabase.auth.signUp({
email,
password
})

if(error){
status.innerText=error.message
return
}

await supabase
.from("users")
.insert({
id:data.user.id,
username
})

}

status.innerText="Access Granted"

setTimeout(()=>{
window.location.href="home.html"
},800)

}catch{

status.innerText="Authentication Failed"

}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.0/tsparticles.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
